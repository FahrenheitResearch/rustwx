name: rustwx CI

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - .github/workflows/**
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rustwx:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: rustwx

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out rustwx
        uses: actions/checkout@v4
        with:
          path: rustwx

      - name: Set up Rust 1.85.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rustwx -> target

      - name: Check full workspace
        run: cargo check --workspace --all-targets

      - name: Test rustwx-models
        run: cargo test -p rustwx-models --lib

      - name: Test rustwx-io
        run: cargo test -p rustwx-io --lib

      - name: Test rustwx-products
        run: cargo test -p rustwx-products --lib

      - name: Test rustwx-render
        run: cargo test -p rustwx-render --lib

      - name: Build non-ECAPE hour runner
        run: cargo build --release -p rustwx-cli --bin hrrr_non_ecape_hour

      - name: Build generic direct batch runner
        run: cargo build --release -p rustwx-cli --bin direct_batch

      - name: Build generic derived batch runner
        run: cargo build --release -p rustwx-cli --bin derived_batch

      - name: Build generic ECAPE batch runner
        run: cargo build --release -p rustwx-cli --bin ecape8_batch

      - name: Build shared heavy batch runner
        run: cargo build --release -p rustwx-cli --bin hrrr_batch
